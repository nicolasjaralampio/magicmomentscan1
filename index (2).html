let scannerActivo = null;

function normalizar(valor) {
  return String(valor ?? "").trim();
}

function formatearPrecio(valor) {
  const numero = Number(String(valor).replace(",", "."));
  if (isNaN(numero)) return "$ " + valor;
  return numero.toLocaleString("es-AR", {
    style: "currency",
    currency: "ARS",
    maximumFractionDigits: 0
  });
}

function mostrarAviso(texto) {
  const aviso = document.getElementById("aviso");
  aviso.style.display = "block";
  aviso.textContent = texto;
}

function ocultarAviso() {
  const aviso = document.getElementById("aviso");
  aviso.style.display = "none";
  aviso.textContent = "";
}

function buscarProducto(codigo) {
  codigo = normalizar(codigo);

  if (!codigo) {
    mostrarAviso("Ingresá o escaneá un código.");
    return;
  }

  const producto = productos.find(p =>
    normalizar(p.codigoBarra) === codigo ||
    normalizar(p.codigoInterno) === codigo
  );

  mostrarResultado(producto, codigo);
}

function mostrarResultado(producto, codigo) {
  const div = document.getElementById("resultado");
  div.innerHTML = "";

  const card = document.createElement("div");
  card.className = "card";

  if (!producto) {
    const error = document.createElement("div");
    error.className = "error";
    error.textContent = "Producto no encontrado";

    const codigoEl = document.createElement("p");
    codigoEl.textContent = "Código leído: " + codigo;

    card.appendChild(error);
    card.appendChild(codigoEl);
    div.appendChild(card);
    return;
  }

  const nombre = document.createElement("div");
  nombre.className = "producto";
  nombre.textContent = producto.producto;

  const precio = document.createElement("div");
  precio.className = "precio";
  precio.textContent = formatearPrecio(producto.precioVenta);

  const codigos = document.createElement("div");
  codigos.className = "codigo";
  codigos.innerHTML =
    "<b>Código de barra:</b> " + (producto.codigoBarra || "-") +
    "<br><b>Código interno:</b> " + (producto.codigoInterno || "-");

  card.appendChild(nombre);
  card.appendChild(precio);
  card.appendChild(codigos);
  div.appendChild(card);
}

function buscarManual() {
  const input = document.getElementById("codigoManual");
  buscarProducto(input.value);
  input.select();
}

async function iniciarScanner() {
  ocultarAviso();

  if (!window.isSecureContext) {
    mostrarAviso("La cámara requiere HTTPS. En GitHub Pages va a funcionar porque usa https://. No funciona si abrís el archivo directo desde la PC.");
    return;
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    mostrarAviso("Este navegador no permite acceso a cámara. Probá con Chrome o Edge actualizado.");
    return;
  }

  try {
    if (scannerActivo) {
      await scannerActivo.stop();
      scannerActivo = null;
    }

    scannerActivo = new Html5Qrcode("reader");

    await scannerActivo.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 300, height: 170 },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E
        ]
      },
      async codigoLeido => {
        buscarProducto(codigoLeido);
        document.getElementById("codigoManual").value = codigoLeido;

        try {
          await scannerActivo.stop();
          scannerActivo = null;
        } catch (e) {}
      },
      error => {}
    );
  } catch (err) {
    mostrarAviso("No se pudo abrir la cámara. Revisá que hayas permitido el acceso y que estés entrando desde GitHub Pages con https://.");
  }
}

async function detenerScanner() {
  if (scannerActivo) {
    try { await scannerActivo.stop(); } catch (e) {}
    scannerActivo = null;
  }
}

document.getElementById("codigoManual").addEventListener("keydown", function(e) {
  if (e.key === "Enter") buscarManual();
});
