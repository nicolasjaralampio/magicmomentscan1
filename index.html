<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Cotillón</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222;
    --accent: #f5c542;
    --accent2: #ff6b6b;
    --text: #f0f0f0;
    --muted: #888;
    --border: #333;
    --success: #4ade80;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header p  { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* CAMERA */
  #camera-container {
    margin: 16px;
    position: relative;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 4/3;
    border: 2px solid var(--border);
  }

  #interactive { width: 100%; height: 100%; position: relative; }
  #interactive video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 230px; height: 110px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    position: relative;
  }

  .scan-line {
    position: absolute;
    top: 0; left: 10px; right: 10px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: scanline 2s ease-in-out infinite;
  }

  @keyframes scanline {
    0%   { top: 8px; }
    50%  { top: calc(100% - 8px); }
    100% { top: 8px; }
  }

  .cam-status {
    position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.55);
  }

  /* BUTTONS */
  .btn-area { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  #start-btn, #stop-btn {
    padding: 14px; border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700; cursor: pointer; width: 100%;
    transition: transform 0.15s;
  }
  #start-btn { background: var(--accent); color: #000; }
  #start-btn:active { transform: scale(0.97); }
  #stop-btn  { background: var(--border); color: var(--text); display: none; }

  /* RESULT */
  .result-card {
    margin: 16px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
    display: none;
  }
  .result-card.found     { border-color: var(--success); display: block; }
  .result-card.not-found { border-color: var(--accent2); display: block; }

  .result-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 8px;
  }
  .result-name  { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
  .result-cat   { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .result-price { font-size: 36px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
  .result-price sup { font-size: 16px; font-weight: 600; vertical-align: super; }
  .result-barcode { font-size: 10px; color: var(--muted); margin-top: 10px; font-family: monospace; }

  .not-found-msg  { font-size: 15px; color: var(--accent2); font-weight: 600; }
  .not-found-code { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: monospace; }
</style>
</head>
<body>

<header>
  <div class="logo">🎉</div>
  <div>
    <h1>Scanner Cotillón</h1>
    <p>43 productos con código de barras</p>
  </div>
</header>

<div id="camera-container">
  <div id="interactive"></div>
  <div class="scan-overlay">
    <div class="scan-frame">
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="cam-status" id="cam-status">Presioná "Activar cámara"</div>
</div>

<div class="btn-area">
  <button id="start-btn" onclick="startScanner()">📷 Activar cámara</button>
  <button id="stop-btn"  onclick="stopScanner()">⏹ Detener cámara</button>
</div>

<div class="result-card" id="result-card">
  <div class="result-label" id="res-label">—</div>
  <div class="result-name" id="res-name">—</div>
  <div class="result-cat"  id="res-cat">—</div>
  <div class="result-price"><sup>$</sup><span id="res-price">—</span></div>
  <div class="result-barcode" id="res-barcode">—</div>
</div>

<script>
// Solo productos con código de barras real, solo precio de venta
const PRODUCTOS = [
  {"barcode":"6900000013199","nombre":"llaveros emoji","categoria":"Sorpresitas","precio":900},
  {"barcode":"6900000019573","nombre":"tatoo temporal 12 x 6.8 cm x 20 U","categoria":"Sorpresitas","precio":6000},
  {"barcode":"6902018028264","nombre":"abridor conejo silicona","categoria":"sorpresitas","precio":1700},
  {"barcode":"6820190158718","nombre":"mascara V metaliz oro","categoria":"Disfraces Acces","precio":2600},
  {"barcode":"6820190158718","nombre":"mascara V metaliz plata","categoria":"Disfraces Acces","precio":2600},
  {"barcode":"682019011037","nombre":"veneciana metaliz lisa colores","categoria":"Disfraces Acces","precio":1000},
  {"barcode":"1002","nombre":"nariz smile luminosa Smile","categoria":"Disfraces Acces Luz","precio":1300},
  {"barcode":"6820191359947","nombre":"mantel metal rayas Dorado","categoria":"Decoración","precio":3200},
  {"barcode":"6820191359954","nombre":"mantel metal rayas Plateado","categoria":"Decoración","precio":3200},
  {"barcode":"6820191359961","nombre":"mantel metal rayas Rosado","categoria":"Decoración","precio":3200},
  {"barcode":"6820191359923","nombre":"mantel metal rayas Rojo","categoria":"Decoración","precio":3200},
  {"barcode":"6820191359930","nombre":"mantel metal rayas Azul","categoria":"Decoración","precio":3200},
  {"barcode":"6820191359918","nombre":"mantel metal rayas Fucsia","categoria":"Decoración","precio":3200},
  {"barcode":"6820191359916","nombre":"mantel metaliz Feliz Cumple Rosa","categoria":"Decoración","precio":3200},
  {"barcode":"6820190220989","nombre":"guirnalda Mi Bautismo Rosa","categoria":"Decoración","precio":1900},
  {"barcode":"6820190220989","nombre":"guirnalda Mi Bautismo Celeste","categoria":"Decoración","precio":1900},
  {"barcode":"6920192209101","nombre":"guirnalda Feliz Comunion","categoria":"Decoración","precio":1900},
  {"barcode":"6920192209333","nombre":"banderin multicolor FC","categoria":"Decoración","precio":1600},
  {"barcode":"6926289598769","nombre":"cucharita metal dorado x 24 U","categoria":"Descartables","precio":7000},
  {"barcode":"6820190142892","nombre":"cuchillo con mango Rosa x 10 U","categoria":"Descartables","precio":6500},
  {"barcode":"6926289598776","nombre":"tenedor premium con glitter Rosa x 12 U","categoria":"Descartables","precio":3000},
  {"barcode":"6820190713702","nombre":"cuchara de madera azul x 20 U","categoria":"Descartables","precio":3500},
  {"barcode":"90817","nombre":"cuchara de madera lila x 20 U","categoria":"Descartables","precio":3500},
  {"barcode":"90816","nombre":"cuchara de madera verde x 20 U","categoria":"Descartables","precio":3500},
  {"barcode":"6900001357247","nombre":"sorbete multicolor rayas oro x 25 U","categoria":"Descartables","precio":1800},
  {"barcode":"6900001357278","nombre":"sorbete multicolor paper x 25 U","categoria":"Descartables","precio":1800},
  {"barcode":"6900001357148","nombre":"sorbete Iris Celeste x 25 U","categoria":"Descartables","precio":1800},
  {"barcode":"6900001357087","nombre":"sorbete Iris Rosa x 25 U","categoria":"Descartables","precio":1800},
  {"barcode":"6900001357070","nombre":"sorbete Iris Blanco x 25 U","categoria":"Descartables","precio":1800},
  {"barcode":"6820190135245","nombre":"servilletas arcoiris x 20 U","categoria":"Descartables","precio":3100},
  {"barcode":"2023052623063","nombre":"plato corazon grande Verde c/borde x 10 U","categoria":"Descartables","precio":5600},
  {"barcode":"9100512430140","nombre":"llavero Mickey blister x 12 U","categoria":"Sorpresitas","precio":600},
  {"barcode":"9100512430119","nombre":"llavero Buho Metal blister x 12 U","categoria":"Sorpresitas","precio":600},
  {"barcode":"9100512430010","nombre":"llavero Buho blister x 12 U","categoria":"Sorpresitas","precio":600},
  {"barcode":"9100512430102","nombre":"llavero Flor blister x 12 U","categoria":"Sorpresitas","precio":600},
  {"barcode":"9100512430157","nombre":"llavero Numeros blister x 12 U","categoria":"Sorpresitas","precio":600},
  {"barcode":"900552000003","nombre":"globo Corazon Metaliz 45 cm (Rojo)","categoria":"Globos","precio":300},
  {"barcode":"6171712250121","nombre":"globo Corazon degradé metaliz 45 cm (Fucsia/Celeste)","categoria":"Globos","precio":400},
  {"barcode":"302116","nombre":"globo Selfie 50 cm (dorado)","categoria":"Globos","precio":1000},
  {"barcode":"9100191251104","nombre":"globo Vaquita de San Antonio 56 cm (Fucsia)","categoria":"Globos","precio":2100},
  {"barcode":"9100191251104","nombre":"globo Vaquita de San Antonio 56 cm (Rojo y Negro)","categoria":"Globos","precio":2100},
  {"barcode":"9100191211115","nombre":"globo Vaquita de San Antonio 56 cm (Rojo y Negro)","categoria":"Globos","precio":2100},
  {"barcode":"1010","nombre":"pulsera acrilico luminosa","categoria":"Sorpresitas","precio":1500}
];

// Mapa barcode → producto (primer match)
const barcodeMap = {};
PRODUCTOS.forEach(p => {
  if (!barcodeMap[p.barcode]) barcodeMap[p.barcode] = p;
});

function formatPrecio(n) {
  return n.toLocaleString('es-AR');
}

let scanning = false;
let lastCode = '';
let lastTime = 0;

function startScanner() {
  document.getElementById('cam-status').textContent = 'Iniciando cámara...';
  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#interactive'),
      constraints: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
    },
    decoder: {
      readers: ["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader"]
    },
    locate: true
  }, function(err) {
    if (err) {
      document.getElementById('cam-status').textContent = 'Error al abrir cámara';
      return;
    }
    Quagga.start();
    scanning = true;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'block';
    document.getElementById('cam-status').textContent = 'Apuntá al código de barras';
  });

  Quagga.onDetected(function(result) {
    onDetected(result.codeResult.code);
  });
}

function stopScanner() {
  if (scanning) { Quagga.stop(); scanning = false; }
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('cam-status').textContent = 'Cámara detenida';
}

function onDetected(code) {
  const now = Date.now();
  if (code === lastCode && now - lastTime < 3000) return;
  lastCode = code;
  lastTime = now;
  if (navigator.vibrate) navigator.vibrate(80);

  const p = barcodeMap[code];
  const card = document.getElementById('result-card');

  if (p) {
    card.className = 'result-card found';
    document.getElementById('res-label').textContent = 'Producto encontrado ✓';
    document.getElementById('res-name').textContent = p.nombre;
    document.getElementById('res-cat').textContent = p.categoria;
    document.getElementById('res-price').textContent = formatPrecio(p.precio);
    document.getElementById('res-barcode').textContent = 'Código: ' + code;
  } else {
    card.className = 'result-card not-found';
    card.innerHTML = `
      <div class="not-found-msg">⚠️ Producto no encontrado</div>
      <div class="not-found-code">Código escaneado: ${code}</div>
    `;
  }
}
</script>
</body>
</html>
